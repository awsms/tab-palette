<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tab Palette Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="header">
        <h1>Tab Palette</h1>
        <p>Customize sorting, grouping, and search behavior.</p>
      </header>

      <section class="card">
        <h2>Sorting</h2>
        <div class="row">
          <label for="sortMode">Default sort</label>
          <select id="sortMode">
            <option value="lastAccessed">Last opened</option>
            <option value="alpha">Alphabetical</option>
            <option value="group">By group</option>
          </select>
        </div>
        <label class="checkbox">
          <input type="checkbox" id="rememberSort" />
          Remember last used sort in the palette
        </label>
      </section>

      <section class="card">
        <h2>Grouping</h2>
        <label class="checkbox">
          <input type="checkbox" id="enableGroups" />
          Enable tab groups features
        </label>
        <div class="row">
          <label for="groupFilter">Default group filter</label>
          <select id="groupFilter">
            <option value="all">All groups</option>
            <option value="ungrouped">Ungrouped</option>
          </select>
        </div>
        <label class="checkbox">
          <input type="checkbox" id="rememberFilter" />
          Remember last used group filter in the palette
        </label>
      </section>

      <section class="card">
        <h2>Search</h2>
        <label class="checkbox">
          <input type="checkbox" id="searchGroups" />
          Include group names in search
        </label>
      </section>

      <div class="actions">
        <button id="save" type="button">Save</button>
        <button id="reset" type="button" class="ghost">Reset defaults</button>
        <span id="status" role="status" aria-live="polite"></span>
      </div>
    </main>

    <script src="options.js"></script>
  </body>
</html>
